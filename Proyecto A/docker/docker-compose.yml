version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: rag_postgres
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    container_name: rag_qdrant
    ports:
      - "6334:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  n8n:
    image: n8nio/n8n
    container_name: rag_n8n
    ports:
      - "5679:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=ragdb
      - DB_POSTGRESDB_USER=raguser
      - DB_POSTGRESDB_PASSWORD=ragpass
    depends_on:
      - postgres
      - qdrant
      - ollama
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  n8n_data: